name: EventraHQ Production Deployment

on:
  workflow_run:
    workflows: [EventraHQ CI]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: eventrahq-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Migrate, deploy, and smoke test
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout verified revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Configure Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link production database
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
      - name: Preview production migrations
        run: supabase db push --linked --include-all --dry-run
      - name: Apply production migrations
        run: supabase db push --linked --include-all
      - name: Install pinned Vercel CLI
        run: npm install --global vercel@54.14.2
      - name: Pull Vercel production settings
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Build Vercel production bundle
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Deploy frontend to Vercel
        id: vercel
        shell: bash
        run: echo "url=$(vercel deploy --prebuilt --prod --token='${{ secrets.VERCEL_TOKEN }}')" >> "$GITHUB_OUTPUT"
      - name: Trigger Render deployment
        run: curl --fail --silent --show-error --request POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
      - name: Wait for API readiness
        shell: bash
        run: |
          for attempt in {1..36}; do
            if curl --fail --silent --show-error "${{ secrets.API_HEALTH_URL }}"; then exit 0; fi
            sleep 10
          done
          exit 1
      - name: Verify frontend response
        run: curl --fail --silent --show-error "${{ steps.vercel.outputs.url }}" > /dev/null
